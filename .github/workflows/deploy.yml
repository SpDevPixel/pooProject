name: Deploy Spring Boot to AWS EC2

on:
  push:
    branches:
      - main  # 본인이 사용하는 메인 브랜치 이름 (master일 경우 master로 변경)
    paths:
      - 'backend/**' # backend 폴더 안의 코드가 바뀔 때만 작동하도록 제한

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리의 코드를 가져옴
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 자바 21 환경 세팅
      - name: Set up JDK 21
        uses: actions/愛情/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. gradlew에 실행 권한 부여 (backend 폴더 기준)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./backend

      # 4. Spring Boot 프로젝트 빌드 (.jar 파일 생성)
      - name: Build with Gradle
        run: ./gradlew clean build -x test
        working-directory: ./backend

      # 5. 빌드된 .jar 파일을 AWS EC2로 전송 및 실행
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3

      # 6. EC2에 원격 접속해서 기존 서버 끄고 새 서버 켜기
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # 기존에 켜져있던 스프링 부트가 있다면 종료
            CURRENT_PID=$(pgrep -f .jar)
            if [ -z "$CURRENT_PID" ]; then
              echo "👉 구동 중인 서버가 없으므로 종료하지 않습니다."
            else
              echo "👉 구동 중인 서버 종료 (PID: $CURRENT_PID)"
              kill -15 $CURRENT_PID
              sleep 5
            fi
            
            # 새 jar 파일 배포 및 백그라운드 실행
            echo "👉 새 애플리케이션 배포"
            nohup java -jar *.jar --spring.datasource.url="${{ secrets.DB_URL }}" > nohup.out 2>&1 &