name: Deploy Spring Boot to AWS EC2

on:
  push:
    branches:
      - master
#   paths:                  # 👈 앞에 #을 붙여서 주석 처리합니다.
#     - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리의 코드를 가져옴
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 자바 21 환경 세팅 (한자 오타 수정 완료)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. gradlew에 실행 권한 부여 (backend 폴더 기준)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./backend

      # 4. Spring Boot 프로젝트 빌드 (.jar 파일 생성)
      - name: Build with Gradle
        run: ./gradlew clean build -x test
        working-directory: ./backend

      # 5. 빌드된 .jar 파일을 AWS EC2로 전송
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3

      # 6. EC2에 원격 접속해서 기존 서버 끄고 새 서버 켜기
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            # 1. 기존 구동 중인 Jar 프로세스 정확히 찾아 종료 (현재 실행 중인 스크립트 자체는 제외)
            CURRENT_PID=$(pgrep -f "java -jar.*\.jar")
            if [ -z "$CURRENT_PID" ]; then
              echo "👉 구동 중인 서버가 없으므로 종료하지 않습니다."
            else
              echo "👉 구동 중인 서버 종료 (PID: $CURRENT_PID)"
              kill -15 $CURRENT_PID
              sleep 5
              
              # 혹시 안 꺼졌다면 강제 종료
              if pgrep -f "java -jar.*\.jar" > /dev/null; then
                echo "👉 강제 종료 진행 (kill -9)"
                pgrep -f "java -jar.*\.jar" | xargs kill -9
              fi
            fi
            
            # 2. 새 jar 파일 배포 및 완벽한 백그라운드 실행 (stdout, stderr 분리 및 쉘 독립)
            echo "👉 새 애플리케이션 배포"
            chmod +x *.jar
            nohup java -jar *.jar --spring.datasource.url="${{ secrets.DB_URL }}" > nohup.out 2>&1 &
            
            # 3. 프로세스가 끊기지 않고 잘 떴는지 3초간 확인 후 SSH 종료
            sleep 3
            echo "👉 현재 실행 중인 프로세스 확인:"
            ps -ef | grep java