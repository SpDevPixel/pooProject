name: Deploy Spring Boot to AWS EC2

on:
  push:
    branches:
      - master
#   paths:                  # 👈 앞에 #을 붙여서 주석 처리합니다.
#     - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 레포지토리의 코드를 가져옴
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 자바 21 환경 세팅 (한자 오타 수정 완료)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. gradlew에 실행 권한 부여 (backend 폴더 기준)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./backend

      # 4. Spring Boot 프로젝트 빌드 (.jar 파일 생성)
      - name: Build with Gradle
        run: ./gradlew clean build -x test
        working-directory: ./backend

      # 5. 빌드된 .jar 파일을 AWS EC2로 전송
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "backend/build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3

      # 6. EC2에 원격 접속해서 기존 서버 끄고 새 서버 켜기
      - name: Execute remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app
            
            echo "👉 1. 기존 구동 중인 서버 확인"
            # 정확하게 java -jar 로 켜진 프로세스의 ID만 딱 하나 골라냅니다.
            PID=$(ps -ef | grep 'java -jar' | grep -v grep | awk '{print $2}')
            
            if [ -z "$PID" ]; then
              echo "👉 실행 중인 스프링 부트 서버가 없습니다."
            else
              echo "👉 기존 서버 프로세스 종료 (PID: $PID)"
              kill -15 $PID
              sleep 5
              # 5초 뒤에도 살아있다면 확인 후 강제 종료 (에러 무시)
              kill -9 $PID 2>/dev/null || true
            fi
            
            echo "👉 2. 배포 파일 실행 권한 부여"
            chmod +x *.jar
            
            echo "👉 3. 새 애플리케이션 구동 시작"
            # </dev/null 을 추가하여 SSH 세션의 입력 대기를 완벽하게 차단합니다.
            nohup java -jar *.jar --spring.datasource.url="${{ secrets.DB_URL }}" > nohup.out 2>&1 </dev/null &
            
            echo "👉 배포 완료! SSH 세션을 정상 종료합니다."